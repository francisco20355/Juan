<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Robot Club</title>
    <style>
        /* Estilo inspirado en hardware y programación */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        #contenedor {
            width: 90%;
            max-width: 500px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        /* La caja donde escribes arriba y abajo */
        #editor {
            width: 100%;
            min-height: 150px;
            background-color: #000;
            color: #00ff41; /* Verde tipo consola Matrix */
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #444;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            overflow-y: auto;
            white-space: pre-wrap; /* Para que respete los espacios */
        }

        #editor:focus {
            border-color: #007bff;
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.3);
        }

        /* Botón para bajar de renglón */
        #btn-bajar {
            margin-top: 20px;
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            color: white;
            background: linear-gradient(145deg, #007bff, #0056b3);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #btn-bajar:active {
            transform: scale(0.95);
            background: #004494;
        }

        .instruccion {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="contenedor">
        <div class="instruccion">Escribe tus comandos o mensajes abajo:</div>
        
        <div id="editor" contenteditable="true">Inicia tu código aquí...</div>

        <button id="btn-bajar" onclick="bajarRenglon()">
            ⬇️ Bajar Renglón
        </button>
    </div>

    <script>
        function bajarRenglon() {
            const editor = document.getElementById('editor');
            
            // Ponemos el foco en el editor para que el cursor esté ahí
            editor.focus();

            // Ejecuta el comando de salto de línea en la posición actual del cursor
            document.execCommand('insertHTML', false, '<br><br>');
            
            // Scroll automático hacia abajo si el texto es muy largo
            editor.scrollTop = editor.scrollHeight;
        }

        // Borrar el texto inicial al hacer el primer click
        const editor = document.getElementById('editor');
        editor.addEventListener('focus', function() {
            if (this.innerText === "Inicia tu código aquí...") {
                this.innerText = "";
            }
        }, { once: true });
    </script>

</body>
</html>
