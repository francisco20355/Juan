<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕵️‍♂️ DETECTOR DE EDAD 2.0 - SUPABASE PRO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --accent: #fbbf24;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            background: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .modo-disco { animation: fiesta 1.5s infinite; }
        @keyframes fiesta { 
            0% { background: #4c1d95; } 
            50% { background: #be185d; } 
            100% { background: #4c1d95; } 
        }

        .modo-abuelo { 
            background: #d7ccc8 !important; 
            --text-color: #3e2723; 
            --card-bg: #efebe9; 
            --primary: #5d4037; 
        }

        #app {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 32px;
            width: 100%;
            max-width: 550px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .hidden { display: none !important; }

        h1 { 
            font-size: 2.5rem; 
            margin-bottom: 0.5rem; 
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        input {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 1.1rem;
            margin-top: 20px;
            margin-bottom: 25px;
            outline: none;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 12px;
        }
        .btn:hover:not(:disabled) { 
            transform: translateY(-3px) scale(1.02); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .opcion { 
            text-align: left; 
            background: rgba(255,255,255,0.07); 
            text-transform: none;
        }

        .progreso-container { width: 100%; height: 8px; background: #334155; border-radius: 10px; margin-bottom: 30px; }
        #progreso-fill { height: 100%; width: 0%; background: var(--primary); border-radius: 10px; }

        .numero-final { font-size: 6rem; font-weight: 900; color: var(--primary); line-height: 1; margin: 20px 0; }
        .arquetipo { background: var(--accent); color: #000; padding: 8px 20px; border-radius: 50px; font-weight: 800; display: inline-block; }

        .ranking-box { margin-top: 30px; background: rgba(0,0,0,0.4); border-radius: 20px; padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .rank-pos { color: var(--accent); font-weight: bold; }

        .loader {
            width: 48px; height: 48px; border: 5px solid #FFF; border-bottom-color: var(--primary);
            border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="app">
    <div id="pantalla-inicio">
        <h1>🕵️‍♂️ DETECTOR 2.0</h1>
        <p>Descubrí tu verdadera edad mental analizando tu consumo cultural y hábitos.</p>
        <input type="text" id="input-nombre" placeholder="Tu nombre o apodo..." maxlength="15">
        <button class="btn" onclick="iniciarTest()">EMPEZAR ESCANEO</button>
        <button class="btn" style="background: transparent; border: 2px solid var(--primary); color: var(--primary);" onclick="verRankingDirecto()">🏆 VER RANKING</button>
    </div>

    <div id="pantalla-quiz" class="hidden">
        <div class="progreso-container"><div id="progreso-fill"></div></div>
        <p id="pregunta-contador" style="color: var(--primary); font-weight: bold;"></p>
        <h2 id="pregunta-titulo" style="min-height: 90px;"></h2>
        <div id="opciones-contenedor"></div>
    </div>

    <div id="pantalla-carga" class="hidden">
        <span class="loader"></span>
        <h2 style="margin-top: 20px;">Conectando con Supabase...</h2>
    </div>

    <div id="pantalla-final" class="hidden">
        <div id="arquetipo-tag" class="arquetipo">CALCULANDO...</div>
        <h2 style="margin: 10px 0 0 0;">TU EDAD MENTAL ES:</h2>
        <div id="res-edad" class="numero-final">0</div>
        <p id="res-descripcion" style="font-weight: bold; margin-bottom: 25px;"></p>
        
        <div class="ranking-box">
            <h3 style="margin-top: 0; color: var(--primary);">🏆 TOP 5 MENTES JÓVENES</h3>
            <table>
                <tbody id="ranking-body"></tbody>
            </table>
        </div>

        <button class="btn" style="background: #25d366; margin-top: 20px;" onclick="compartirWA()">COMPARTIR EN WHATSAPP</button>
        <button class="btn" style="background: transparent; border: 2px solid rgba(255,255,255,0.2);" onclick="location.reload()">REINTENTAR</button>
    </div>
</div>

<script>
    // URL CORREGIDA: Se eliminó la 'h' extra
    const SB_URL = "https://yeumdjkijjijkdwcxhxj.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlldW1kamtpamppamtkd2N4aHhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDQ4MzMsImV4cCI6MjA5MTY4MDgzM30.Cl2HUbxGV5eFut9VQ3-Fx0WtT6oJpx4F_AOfGJ4pdl0";
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    const preguntas = [
        { t: "¿Qué plan suena mejor para un sábado de noche?", o: [{t:"Jugar online o scrollear en TikTok", m:13}, {t:"Juntarme a comer pizza con amigos", m:25}, {t:"Quedarme dormido en el sillón a las 22:00", m:65}] },
        { t: "¿Qué decís cuando algo está muy bueno?", o: [{t:"«Está god» o «Es cine»", m:12}, {t:"«Está tremendo» o «Demás»", m:28}, {t:"«Qué bárbaro» o «Macanudo»", m:70}] },
        { t: "¿Cómo pagás cuando vas al kiosco o al súper?", o: [{t:"No pago, me compran las cosas", m:10}, {t:"MercadoPago o código QR", m:22}, {t:"Efectivo, con las monedas contadas", m:60}] },
        { t: "¿Dónde te enterás de las noticias o de lo que pasa?", o: [{t:"Por memes en Instagram/TikTok", m:14}, {t:"Leo portales o Twitter (X)", m:30}, {t:"Miro el informativo en la tele", m:70}] },
        { t: "¿Cuál es tu desayuno o merienda ideal?", o: [{t:"Bebida energizante y unas papitas", m:15}, {t:"Mate con bizcochos", m:35}, {t:"Té con galletitas María y mermelada", m:75}] },
        { t: "¿Qué hacés si se cae el WiFi de tu casa?", o: [{t:"Uso los datos del celu indignado", m:16}, {t:"Reinicio el router para ver si agarra", m:30}, {t:"Aprovecho para limpiar o leer algo", m:65}] },
        { t: "¿En qué etapa de los estudios/trabajo estás enfocado?", o: [{t:"Terminando primaria o pensando en la UTU", m:11}, {t:"Trabajando o en la facultad", m:30}, {t:"Ya quiero jubilarme, no doy más", m:60}] },
        { t: "¿Cómo te movés por la ciudad o tu barrio?", o: [{t:"En bici, skate o caminando", m:14}, {t:"Me tomo un ómnibus / Uber", m:28}, {t:"Manejando tranquilo con la radio puesta", m:55}] },
        { t: "¿Cómo escuchás música normalmente?", o: [{t:"Spotify en el celu con auriculares", m:16}, {t:"En un parlante bluetooth o en el auto", m:35}, {t:"Radio AM/FM o discos físicos", m:70}] },
        { t: "¿A qué hora te dormís un día de semana?", o: [{t:"A las 2 AM porque me cuelgo en la pantalla", m:14}, {t:"A las 23:00 después de una serie", m:30}, {t:"A las 21:00 ya estoy roncando", m:75}] },
        { t: "¿Qué hacés si te duele la espalda o la rodilla?", o: [{t:"¿Dolor? No sé qué es eso", m:12}, {t:"Me tomo un Ibuprofeno y sigo", m:30}, {t:"Busco un almohadón y comento el clima", m:68}] },
        { t: "¿Cuál es tu relación con los grupos de WhatsApp?", o: [{t:"Hablo por stickers y audios cortos", m:14}, {t:"Mando memes y organizo el asado", m:32}, {t:"Mando bendiciones y videos de 'Buen día'", m:72}] },
        { t: "¿Qué hacés cuando ves un perro en la calle?", o: [{t:"Le hago un video para una Story", m:15}, {t:"Le silbo y le digo '¿Qué hacés, fiera?'", m:35}, {t:"Le pregunto de quién es y si tiene hambre", m:65}] },
        { t: "¿Cómo guardás el arroz o los fideos que sobraron?", o: [{t:"Los dejo en la olla hasta mañana", m:17}, {t:"En un tupper bien cerrado", m:35}, {t:"En un pote de helado reciclado", m:70}] },
        { t: "¿Qué tanto usás el buscador de Google?", o: [{t:"Busco hasta cómo se escribe 'hola'", m:13}, {t:"Para cosas del laburo o tutoriales", m:30}, {t:"Escribo la URL completa con www y .com", m:65}] },
        { t: "¿Qué hacés si te llama un número desconocido?", o: [{t:"No atiendo ni loco, que manden WhatsApp", m:15}, {t:"Atiendo por si es algo importante", m:35}, {t:"Atiendo y me quedo hablando con el vendedor", m:70}] },
        { t: "¿Qué pensás de los Reels o TikToks?", o: [{t:"Son mi vida, puedo estar 5 horas", m:12}, {t:"Miro algunos para pasar el rato", m:30}, {t:"No entiendo por qué bailan tanto", m:68}] },
        { t: "¿Cómo reaccionás ante un meme nuevo?", o: [{t:"Lo uso hasta que muera el mismo día", m:13}, {t:"Se lo mando a mis amigos por mensaje", m:35}, {t:"Pregunto '¿Quién es este muchacho?'", m:75}] },
        { t: "¿Qué llevás siempre en los bolsillos/mochila?", o: [{t:"El celu y los auriculares", m:14}, {t:"Llaves, billetera y un cargador", m:30}, {t:"Caramelos, pañuelos y algún recibo viejo", m:65}] },
        { t: "¿Cómo te despedís de alguien por mensaje?", o: [{t:"'Chau', 'Nos vemo' o un emoji", m:13}, {t:"'Un abrazo grande, hablamos'", m:35}, {t:"'Saludos a la familia y cuidate mucho'", m:70}] },
        { t: "¿Qué hacés si ves algo desordenado?", o: [{t:"Lo ignoro, ya lo limpiarán", m:12}, {t:"Lo ordeno cuando puedo", m:30}, {t:"No puedo estar en paz si no lo limpio", m:60}] },
        { t: "¿Opinión sobre el volumen de la tele?", o: [{t:"Al máximo, que vibre todo", m:15}, {t:"Normal", m:30}, {t:"¡Bajá eso que me aturde!", m:75}] },
        { t: "¿Qué hacés en un restaurante?", o: [{t:"Foto al plato primero", m:14}, {t:"Pido lo que me gusta", m:35}, {t:"Pido lo de siempre y me quejo del aire", m:65}] },
        { t: "¿Cómo elegís tu ropa?", o: [{t:"Lo que esté limpio", m:16}, {t:"Que combine bien", m:28}, {t:"Miro el pronóstico antes", m:70}] },
        { t: "¿Ruido raro en el auto?", o: [{t:"Subo la radio", m:18}, {t:"Busco en YouTube el ruido", m:32}, {t:"Llamo al mecánico", m:65}] },
        { t: "¿Cómo guardás tus fotos?", o: [{t:"En la nube", m:15}, {t:"En la compu", m:35}, {t:"Álbumes físicos o las imprimo", m:75}] },
        { t: "¿Falla la tecnología?", o: [{t:"Le doy un golpe", m:14}, {t:"Busco en Google", m:28}, {t:"Llamo a un sobrino", m:70}] },
        { t: "¿En una fiesta?", o: [{t:"Bailo hasta las 6", m:16}, {t:"Charlo en la barra", m:32}, {t:"Busco una silla", m:72}] },
        { t: "¿Cajas de cartón viejas?", o: [{t:"A la basura", m:20}, {t:"Tiro algunas", m:35}, {t:"Las guardo 'por las dudas'", m:68}] },
        { t: "¿Relación con el sol?", o: [{t:"Me encanta", m:15}, {t:"Uso protector", m:30}, {t:"Busco la sombra siempre", m:65}] }
    ];

    let actual = 0, score = 0, nombreUsuario = "";

    function iniciarTest() {
        nombreUsuario = document.getElementById('input-nombre').value.trim();
        if(nombreUsuario.length < 2) return alert("Ingresá un nombre!");
        document.getElementById('pantalla-inicio').classList.add('hidden');
        document.getElementById('pantalla-quiz').classList.remove('hidden');
        cargarPregunta();
    }

    function cargarPregunta() {
        const p = preguntas[actual];
        document.getElementById('pregunta-contador').innerText = `PREGUNTA ${actual+1}/30`;
        document.getElementById('pregunta-titulo').innerText = p.t;
        document.getElementById('progreso-fill').style.width = `${(actual/30)*100}%`;
        const cont = document.getElementById('opciones-contenedor');
        cont.innerHTML = '';
        p.o.forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn opcion';
            b.innerText = o.t;
            b.onclick = () => { score+=o.m; actual++; actual<30 ? cargarPregunta() : finalizar(); };
            cont.appendChild(b);
        });
    }

    async function finalizar() {
        document.getElementById('pantalla-quiz').classList.add('hidden');
        document.getElementById('pantalla-carga').classList.remove('hidden');
        const edad = Math.round(score/30);
        
        const { error } = await _supabase.from('ranking_edad').insert([{ nombre: nombreUsuario, edad_mental: edad }]);
        if(error) console.error("Error BD:", error.message);
        
        mostrarResultados(edad);
    }

    async function mostrarResultados(edad) {
        document.getElementById('pantalla-carga').classList.add('hidden');
        document.getElementById('pantalla-final').classList.remove('hidden');
        const resEdad = document.getElementById('res-edad');
        const tag = document.getElementById('arquetipo-tag');
        const desc = document.getElementById('res-descripcion');

        if(edad < 20) { tag.innerText="🚀 CENTENNIAL"; desc.innerText="Vivís en el futuro."; confetti(); }
        else if(edad < 45) { tag.innerText="💼 ADULTO"; tag.style.background="#38bdf8"; desc.innerText="Equilibrio total."; }
        else { tag.innerText="🦖 DINOSAURIO"; tag.style.background="#ef4444"; desc.innerText="Sabiduría pura."; }

        resEdad.innerText = edad;
        cargarRanking();
    }

    async function verRankingDirecto() {
        document.getElementById('pantalla-inicio').classList.add('hidden');
        document.getElementById('pantalla-final').classList.remove('hidden');
        document.getElementById('res-edad').innerText = "--";
        document.getElementById('arquetipo-tag').innerText = "ESPECTADOR";
        document.getElementById('res-descripcion').innerText = "Viendo el ranking global.";
        cargarRanking();
    }

    async function cargarRanking() {
        const { data } = await _supabase.from('ranking_edad').select('*').order('edad_mental', { ascending: true }).limit(5);
        const tbody = document.getElementById('ranking-body');
        tbody.innerHTML = data ? data.map((r, i) => `<tr><td><span class="rank-pos">#${i+1}</span> ${r.nombre}</td><td>${r.edad_mental} años</td></tr>`).join('') : "Sin datos";
    }

    function compartirWA() {
        const msg = encodeURIComponent("¡Hice el test de Edad Mental! Mi resultado fue sorprendente. ¿Te animás?");
        window.open(`https://wa.me/?text=${msg}`);
    }
</script>
</body>
</html>
