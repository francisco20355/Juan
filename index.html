<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            background-color: #121212; /* Fondo oscuro para que resalte el sticker */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        /* EL CUADRADO BLANCO */
        #sticker-canvas {
            width: 320px;
            height: 320px;
            background-color: white;
            border-radius: 40px; /* Bordes redondeados exactos */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 25px;
            box-sizing: border-box;
            margin-bottom: 30px;
        }

        #text-output {
            color: black;
            font-size: 32px;
            font-weight: 600;
            text-align: center;
            line-height: 1.2;
            word-break: break-word;
            margin: 0;
        }

        /* CONTROLES */
        .ui {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-size: 18px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #fe2c55; /* Color rojo TikTok */
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div id="sticker-canvas">
        <p id="text-output">Tu texto aquí</p>
    </div>

    <div class="ui">
        <input type="text" id="user-input" placeholder="Escribe tu mensaje..." maxlength="60">
        <button onclick="saveSticker()">GENERAR Y DESCARGAR</button>
    </div>

    <script>
        const input = document.getElementById('user-input');
        const output = document.getElementById('text-output');

        // Cambia el texto mientras escribes
        input.addEventListener('input', () => {
            output.innerText = input.value || "Tu texto aquí";
        });

        // Convierte el cuadrado en imagen
        function saveSticker() {
            const node = document.getElementById('sticker-canvas');
            
            html2canvas(node, {
                backgroundColor: null, // Para que si quieres lo hagas transparente
                scale: 3 // Mucha calidad para que no se vea borroso
            }).then(canvas => {
                const imgData = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.download = 'sticker-cuadrado.png';
                link.href = imgData;
                link.click();
            });
        }
    </script>
</body>
</html>
