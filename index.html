<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creador de Stickers - Robot Club</title>
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        /* El cuadrado blanco de la imagen */
        #area-sticker {
            width: 300px;
            height: 300px;
            background-color: white;
            border: 2px solid #ddd;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Caja de texto dentro del cuadrado */
        #texto-sticker {
            width: 90%;
            height: 90%;
            border: none;
            outline: none;
            resize: none;
            font-size: 24px;
            text-align: center;
            font-weight: bold;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            overflow-y: auto;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-bajar { background-color: #e7e7e7; color: #333; }
        .btn-descargar { background-color: #25d366; color: white; } /* Color WhatsApp */

        button:hover { opacity: 0.8; }
        
        canvas { display: none; } /* Oculto, solo para procesar la imagen */
    </style>
</head>
<body>

    <div class="container">
        <h3>Creador de Stickers</h3>
        
        <div id="area-sticker">
            <div id="texto-sticker" contenteditable="true">Toca aquí para escribir...</div>
        </div>

        <div class="controls">
            <button class="btn-bajar" onclick="bajarRenglon()">⬇️ Bajar Renglón</button>
            <button class="btn-descargar" onclick="exportarImagen()">💾 Descargar para WhatsApp</button>
        </div>
        
        <p style="font-size: 12px; color: #777; margin-top: 15px;">
            Al descargar, se guardará como PNG transparente. <br>
            Usa "Sticker.ly" o "Personal Stickers" para subirlo a WhatsApp.
        </p>
    </div>

    <canvas id="canvas-sticker" width="512" height="512"></canvas>

    <script>
        const editor = document.getElementById('texto-sticker');

        // Función para bajar renglón
        function bajarRenglon() {
            editor.focus();
            document.execCommand('insertHTML', false, '<br>');
        }

        // Función para convertir el cuadrado en una imagen real
        function exportarImagen() {
            const canvas = document.getElementById('canvas-sticker');
            const ctx = canvas.getContext('2d');

            // 1. Fondo (puedes dejarlo blanco o transparente)
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Transparente
            
            // 2. Dibujar el texto
            ctx.fillStyle = "black";
            ctx.font = "bold 40px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            // Obtener el texto del div y dividirlo por líneas
            const lineas = editor.innerText.split('\n');
            const x = canvas.width / 2;
            let y = (canvas.height / 2) - ((lineas.length - 1) * 25);

            lineas.forEach(linea => {
                ctx.fillText(linea, x, y);
                y += 50; // Espacio entre líneas
            });

            // 3. Descargar la imagen
            const link = document.createElement('a');
            link.download = 'mi-sticker.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        }

        // Limpiar el texto inicial
        editor.addEventListener('focus', function() {
            if (this.innerText === "Toca aquí para escribir...") {
                this.innerText = "";
            }
        }, { once: true });
    </script>

</body>
</html>
