<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕵️‍♂️ DETECTOR DE EDAD 2.0 - SUPABASE PRO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --accent: #fbbf24;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            background: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Animaciones Dinámicas */
        .modo-disco { animation: fiesta 1.5s infinite; }
        @keyframes fiesta { 
            0% { background: #4c1d95; } 
            50% { background: #be185d; } 
            100% { background: #4c1d95; } 
        }

        .modo-abuelo { 
            background: #d7ccc8 !important; 
            --text-color: #3e2723; 
            --card-bg: #efebe9; 
            --primary: #5d4037; 
        }

        #app {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 32px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .hidden { display: none !important; }

        h1 { 
            font-size: 2.5rem; 
            margin-bottom: 0.5rem; 
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        p { opacity: 0.8; line-height: 1.5; }

        input {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 1.1rem;
            margin-top: 20px;
            margin-bottom: 25px;
            outline: none;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.2); }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
        }
        .btn:hover:not(:disabled) { 
            transform: translateY(-3px) scale(1.02); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            filter: brightness(1.1);
        }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .opcion { 
            text-align: left; 
            background: rgba(255,255,255,0.07); 
            margin-bottom: 12px;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .opcion:hover { background: rgba(255,255,255,0.15); border-color: var(--primary); }

        /* Barra de Progreso */
        .progreso-container { width: 100%; height: 8px; background: #334155; border-radius: 10px; margin-bottom: 30px; }
        #progreso-fill { height: 100%; width: 0%; background: var(--primary); border-radius: 10px; box-shadow: 0 0 15px var(--primary); }

        /* Resultados */
        .numero-final { font-size: 6rem; font-weight: 900; color: var(--primary); line-height: 1; margin: 20px 0; }
        .arquetipo { 
            background: var(--accent); 
            color: #000; 
            padding: 5px 15px; 
            border-radius: 50px; 
            font-weight: 800; 
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 15px;
        }

        /* Tabla de Ranking */
        .ranking-box { 
            margin-top: 30px; 
            background: rgba(0,0,0,0.4); 
            border-radius: 20px; 
            padding: 20px; 
            font-size: 0.9rem;
        }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; opacity: 0.5; padding-bottom: 10px; }
        td { padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .rank-pos { color: var(--accent); font-weight: bold; margin-right: 8px; }

        /* Spinner */
        .loader {
            width: 48px; height: 48px; border: 5px solid #FFF; border-bottom-color: var(--primary);
            border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="app">
    <div id="pantalla-inicio">
        <h1>🕵️‍♂️ DETECTOR 2.0</h1>
        <p>¿Qué tan vieja es tu alma tecnológica? Vamos a descubrirlo con ciencia (y Supabase).</p>
        <input type="text" id="input-nombre" placeholder="Tu nombre o apodo..." maxlength="15">
        <button class="btn" onclick="iniciarTest()">EMPEZAR ESCANEO</button>
    </div>

    <div id="pantalla-quiz" class="hidden">
        <div class="progreso-container"><div id="progreso-fill"></div></div>
        <p id="pregunta-contador" style="font-weight: bold; font-size: 0.8rem; color: var(--primary);"></p>
        <h2 id="pregunta-titulo" style="min-height: 80px; font-size: 1.5rem;"></h2>
        <div id="opciones-contenedor"></div>
    </div>

    <div id="pantalla-carga" class="hidden">
        <span class="loader"></span>
        <h2 style="margin-top: 20px;">Analizando mañas...</h2>
        <p>Subiendo datos al satélite de Supabase.</p>
    </div>

    <div id="pantalla-final" class="hidden">
        <div id="arquetipo-tag" class="arquetipo">CALCULANDO...</div>
        <h2>EDAD MENTAL</h2>
        <div id="res-edad" class="numero-final">0</div>
        <p id="res-descripcion" style="font-weight: bold; margin-bottom: 30px;"></p>
        
        <div class="ranking-box">
            <h3 style="margin-top: 0;">🏆 HALL OF FAME (TOP 5)</h3>
            <table>
                <thead><tr><th>Mente</th><th>Edad</th></tr></thead>
                <tbody id="ranking-body"></tbody>
            </table>
        </div>

        <button class="btn" style="background: #25d366; margin-top: 25px;" onclick="compartirWA()">RETAR EN WHATSAPP</button>
        <button class="btn" style="background: transparent; border: 2px solid rgba(255,255,255,0.2); margin-top: 10px;" onclick="location.reload()">REINTENTAR</button>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN ---
    const SB_URL = "https://yeumdjkijjijkdwxhhxj.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlldW1kamtpamppamtkd2N4aHhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDQ4MzMsImV4cCI6MjA5MTY4MDgzM30.Cl2HUbxGV5eFut9VQ3-Fx0WtT6oJpx4F_AOfGJ4pdl0";
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    const preguntas = [
        { t: "¿A qué jugás cuando tenés tiempo libre?", o: [{t:"Roblox / ", m:12}, {t:"GTA 5 / Valorant", m:18}, {t:"Solitario / Buscaminas", m:65}] },
        { t: "¿Cómo escuchás música?", o: [{t:"Parlante del celu", m:18}, {t:"Subwoofer / Placa ZK-MT21", m:14}, {t:"Radio AM bajito", m:75}] },
        { t: "¿Qué hacés si se rompe la compu (bisagra/pin)?", o: [{t:"Lloro y me rindo", m:13}, {t:"Busco soporte o la arreglo yo", m:16}, {t:"La dejo tirada un año", m:60}] },
        { t: "¿Qué herramientas usás para tus proyectos?", o: [{t:"GitHub + Supabase", m:14}, {t:"Solo WhatsApp", m:28}, {t:"Papel y lápiz", m:70}] },
        { t: "¿Qué planeás para el futuro?", o: [{t:"Vivir de YouTube/TikTok", m:11}, {t:"Ir a la utu y hacer una carrera", m:15}, {t:"Trabajo de oficina 9 a 5", m:50}] },
        { t: "¿Se la prestás a tu hermana si te pide la compu?", o: [{t:"Se la doy enseguida", m:18}, {t:"Le digo que estoy codeando", m:14}, {t:"¡Ni loco! Es mi setup", m:35}] },
        { t: "¿Cuál es tu merienda favorita?", o: [{t:"Energizante y Doritos", m:14}, {t:"Chocolatada y galletitas", m:12}, {t:"Mate y tortas fritas", m:60}] },
        { t: "¿Cómo te movés por Solymar?", o: [{t:"En bici / skate", m:14}, {t:"En ómnibus (STCU)", m:25}, {t:"Manejando tranquilo", m:62}] },
        { t: "¿A qué hora te dormís normalmente?", o: [{t:"2 AM (jugando o codeando)", m:15}, {t:"A las 11 PM", m:28}, {t:"9 PM viendo el informativo", m:75}] },
        { t: "¿Cómo tenés las notificaciones del celu?", o: [{t:"Silencio total", m:16}, {t:"Ruidito de WhatsApp", m:30}, {t:"Tono de llamada al máximo", m:80}] }
    ];

    let actual = 0, score = 0, nombreUsuario = "", bloqueado = false;

    function iniciarTest() {
        nombreUsuario = document.getElementById('input-nombre').value.trim();
        if(nombreUsuario.length < 2) return alert("¡Poné un nombre real!");
        
        document.getElementById('pantalla-inicio').classList.add('hidden');
        document.getElementById('pantalla-quiz').classList.remove('hidden');
        cargarPregunta();
    }

    function cargarPregunta() {
        bloqueado = false;
        const p = preguntas[actual];
        document.getElementById('pregunta-contador').innerText = `DESAFÍO ${actual + 1} / ${preguntas.length}`;
        document.getElementById('pregunta-titulo').innerText = p.t;
        document.getElementById('progreso-fill').style.width = `${((actual) / preguntas.length) * 100}%`;
        
        const contenedor = document.getElementById('opciones-contenedor');
        contenedor.innerHTML = '';

        p.o.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'btn opcion';
            b.innerText = opt.t;
            b.onclick = () => { if(!bloqueado) procesarRespuesta(opt.m); };
            contenedor.appendChild(b);
        });
    }

    function procesarRespuesta(m) {
        bloqueado = true;
        score += m;
        actual++;

        const promedio = score / actual;
        if(promedio > 50) document.body.className = 'modo-abuelo';
        else if(promedio < 18) document.body.className = 'modo-disco';
        else document.body.className = '';

        if(actual < preguntas.length) {
            setTimeout(cargarPregunta, 200);
        } else {
            finalizar();
        }
    }

    async function finalizar() {
        document.getElementById('pantalla-quiz').classList.add('hidden');
        document.getElementById('pantalla-carga').classList.remove('hidden');

        const edadFinal = Math.round(score / preguntas.length);

        try {
            await _supabase.from('ranking_edad').insert([{ nombre: nombreUsuario, edad_mental: edadFinal }]);
        } catch (e) { console.error("Error DB:", e); }

        mostrarResultados(edadFinal);
    }

    async function mostrarResultados(edad) {
        document.getElementById('pantalla-carga').classList.add('hidden');
        document.getElementById('pantalla-final').classList.remove('hidden');
        document.body.className = "";

        const edadElement = document.getElementById('res-edad');
        const descElement = document.getElementById('res-descripcion');
        const tagElement = document.getElementById('arquetipo-tag');

        // Lógica de Arquetipos
        if(edad < 16) {
            tagElement.innerText = "🚀 PIBE BASADO";
            descElement.innerText = "Tu mente corre a 120 FPS. Sos el terror de los servidores de Roblox.";
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        } else if(edad < 35) {
            tagElement.innerText = "💼 JOVEN PROMESAS";
            tagElement.style.background = "#38bdf8";
            descElement.innerText = "Ya sabés lo que es un bug, pero todavía tenés energía para grindear.";
        } else {
            tagElement.innerText = "🦖 DINOSAURIO TECH";
            tagElement.style.background = "#ef4444";
            tagElement.style.color = "white";
            descElement.innerText = "Acomodate los lentes y bajale al volumen, abuelo.";
        }

        // Animación de números
        let i = 0;
        const interval = setInterval(() => {
            if(i >= edad) { edadElement.innerText = edad; clearInterval(interval); }
            else { edadElement.innerText = i++; }
        }, 30);

        // Cargar Ranking de Supabase
        const { data, error } = await _supabase.from('ranking_edad').select('nombre, edad_mental').order('edad_mental', { ascending: true }).limit(5);
        
        const tbody = document.getElementById('ranking-body');
        if(error || !data || data.length === 0) {
            tbody.innerHTML = "<tr><td colspan='2'>No hay datos aún.</td></tr>";
        } else {
            tbody.innerHTML = data.map((r, i) => `
                <tr>
                    <td><span class="rank-pos">#${i+1}</span> ${r.nombre}</td>
                    <td>${r.edad_mental} años</td>
                </tr>
            `).join('');
        }
    }

    function compartirWA() {
        const edad = document.getElementById('res-edad').innerText;
        const tag = document.getElementById('arquetipo-tag').innerText;
        const msg = encodeURIComponent(`🕵️‍♂️ ¡Detector de Edad 2.0! Mi mente es un ${tag} con ${edad} años. ¿Te animás?`);
        window.open(`https://wa.me/?text=${msg}`);
    }
</script>

</body>
</html>
